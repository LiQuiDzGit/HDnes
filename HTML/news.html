<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDnes</title>
    <!-- Importing pixelated and retro fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f0ff;
            --neon-magenta: #ff007f;
            --neon-green: #39ff14;
            --neon-purple: #9d00ff;
            --bg-color: #0b031a;
            --grid-color: rgba(157, 0, 255, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            /* Retro 80s grid background effect */
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- 1. DISCLAIMER BOX --- */
        .disclaimer-container {
            border: 3px solid var(--neon-magenta);
            box-shadow: 0 0 15px var(--neon-magenta), inset 0 0 10px var(--neon-magenta);
            border-radius: 8px;
            padding: 20px;
            max-width: 800px;
            width: 100%;
            text-align: center;
            margin-bottom: 30px;
            background: rgba(11, 3, 26, 0.8);
        }

        .disclaimer-title {
            font-family: 'Press Start 2P', cursive;
            color: var(--neon-cyan);
            font-size: 1.8rem;
            margin-bottom: 12px;
            text-shadow: 0 0 10px var(--neon-cyan);
            text-transform: uppercase;
        }

        .disclaimer-text {
            font-size: 1.0rem;
            line-height: 1.2;
            color: #e0e0ff;
            letter-spacing: 1px;
        }

        /* --- 2. MENU ITEMS --- */
        .nav-menu {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 30px;
            list-style: none;
        }

        .nav-item a {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.9rem;
            color: #fff;
            text-decoration: none;
            padding: 10px 20px;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .nav-item a:hover {
            color: var(--neon-cyan);
            border: 2px solid var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan);
            text-shadow: 0 0 5px var(--neon-cyan);
            background: rgba(0, 240, 255, 0.1);
        }

        /* --- 3. RETRO SEARCH BAR --- */
        .search-container {
            max-width: 800px;
            width: 100%;
            margin-bottom: 40px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(20, 5, 40, 0.9);
            border: 2px solid var(--neon-cyan);
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.3);
            border-radius: 6px;
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.3rem;
            letter-spacing: 1px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus, .search-input:hover {
            border-color: var(--neon-green);
            box-shadow: 0 0 20px var(--neon-green);
            background: rgba(25, 10, 55, 0.95);
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
        }

        /* --- 4. CONTENT BOXES (CLICKABLE) --- */
        .content-list {
            display: flex;
            flex-direction: column;
            gap: 30px;
            max-width: 800px;
            width: 100%;
        }

        .card-link {
            text-decoration: none;
            color: inherit;
            display: block;
            border-radius: 8px;
            transition: transform 0.2s ease, opacity 0.3s ease;
        }

        .card {
            border: 3px solid var(--neon-cyan);
            box-shadow: 0 0 12px rgba(0, 240, 255, 0.4);
            border-radius: 8px;
            background: rgba(20, 5, 40, 0.85);
            padding: 20px;
            display: flex;
            gap: 25px;
            position: relative;
            align-items: flex-start;
            transition: all 0.3s ease;
        }

        .card-link:hover {
            transform: scale(1.02);
        }

        .card-link:hover .card {
            border-color: var(--neon-green);
            box-shadow: 0 0 25px var(--neon-green), inset 0 0 10px rgba(57, 255, 20, 0.15);
            background: rgba(15, 15, 45, 0.95);
        }

        .card-link:hover .card-title {
            color: var(--neon-green);
            text-shadow: 0 0 8px var(--neon-green);
        }

        .card-link:hover .card-img-wrapper {
            border-color: var(--neon-green);
            box-shadow: 0 0 12px var(--neon-green);
        }

        .card-link:hover .card-info-badge {
            color: var(--neon-magenta);
            text-shadow: 0 0 5px var(--neon-magenta);
        }

        .card-img-wrapper {
            width: 140px;
            height: 140px;
            border: 2px solid var(--neon-magenta);
            box-shadow: 0 0 8px var(--neon-magenta);
            flex-shrink: 0;
            background: #1a0033;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .card-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            image-rendering: pixelated; 
        }

        .card-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 140px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .card-title {
            font-family: 'Press Start 2P', cursive;
            color: #fff;
            font-size: 1.2rem;
            text-transform: uppercase;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
        }

        .card-info-badge {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.75rem;
            color: var(--neon-magenta);
            text-shadow: 0 0 5px var(--neon-magenta);
            transition: all 0.3s ease;
        }

        .card-description {
            font-size: 1.1rem;
            line-height: 1.5;
            color: #ccd;
            margin-bottom: 15px;
        }

        .card-description ul {
            margin: 10px 0 10px 20px;
            color: #1E90FF;
        }

        .card-description a {
            color: var(--neon-cyan);
            text-decoration: none;
        }

        .card-description a:hover {
            text-decoration: underline;
        }

        .card-footer {
            display: flex;
            justify-content: flex-end;
        }

        .card-date {
            font-size: 0.9rem;
            color: var(--neon-cyan);
            font-weight: bold;
            letter-spacing: 1px;
        }

        @media (max-width: 600px) {
            .card {
                flex-direction: column;
                align-items: center;
            }
            .card-img-wrapper {
                width: 100%;
                height: 180px;
            }
            .card-content {
                width: 100%;
                min-height: auto;
            }
            .nav-menu {
                flex-wrap: wrap;
                gap: 10px;
            }
        }
    </style>
</head>
<body>

    <!-- 1. Disclaimer Section -->
    <!-- Create a placeholder where the disclaimer will load -->
<div id="disclaimer-placeholder"></div>

<script>
  // Fetch the external HTML file
  fetch('disclaimer.html')
    .then(response => response.text())
    .then(data => {
      // Inject the fetched HTML into the placeholder
      document.getElementById('disclaimer-placeholder').innerHTML = data;
    })
    .catch(error => console.error('Error loading the disclaimer:', error));
</script>

    <!-- 2. Navigation Menu -->
    <!-- Create a placeholder where the disclaimer will load -->
<div id="navigation_menu-placeholder"></div>

<script>
  // Fetch the external HTML file
  fetch('navigation_menu.html')
    .then(response => response.text())
    .then(data => {
      // Inject the fetched HTML into the placeholder
      document.getElementById('navigation_menu-placeholder').innerHTML = data;
    })
    .catch(error => console.error('Error loading the disclaimer:', error));
</script>
    
    <!-- 3. Search box (removed) -->

    <!-- 4. Dynamic Box Container -->
    <div class="content-list" id="contentList">

        <!-- NEWS -->  

            <article class="card">
               
                <div class="card-content">
                    <div class="card-header">
                        <h2 class="card-title">Home: NEWS</h2>
                        
                    </div>
                    <p class="card-description">
                 <br>
                <b>Welcome to HDnes</b> <br>A project dedicated to modernizing classic NES games for the Mesen 2 emulator. <br>
                <br>
                 <b>HDpacks:</b><br> Replace original 8-bit graphics with high-definition external images. <br>
                <br>
                 <b>NEA Audio:</b><br>Replace original soundchip with high-quality, external .ogg audio files. (Similar to SNES MSU-1) <br>

             </ul>
                    </p>
                    
                </div>
            </article>
        

        
       

    </div>
</body>
</html>
